services:
  api:
    build:
      context: ./core
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL}
      DATABASE_ECHO: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_TTL_MINUTES: ${JWT_ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      INVITE_CODE_TTL_DAYS: ${INVITE_CODE_TTL_DAYS:-7}
    expose:
      - "9000"
    restart: unless-stopped

  web:
    build:
      context: ./web
    environment:
      BACKEND_URL: http://api:9000
    ports:
      - "6000:6000"
    depends_on:
      - api
    restart: unless-stopped
