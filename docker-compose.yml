services:
  api:
    build:
      context: ./core
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL}
      DATABASE_ECHO: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ACCESS_TOKEN_TTL_MINUTES: ${JWT_ACCESS_TOKEN_TTL_MINUTES:-15}
      REFRESH_TOKEN_TTL_DAYS: ${REFRESH_TOKEN_TTL_DAYS:-30}
      INVITE_CODE_TTL_DAYS: ${INVITE_CODE_TTL_DAYS:-7}
      # Mail module (docs/rfc/mail-module.md). Off by default — the `stalwart`
      # service below only starts under the `mail` profile, and MAIL_ENABLED
      # itself defaults to false, so a deploy that never opts in is unaffected.
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAIL_SERVER_URL: ${MAIL_SERVER_URL:-http://stalwart:8080}
      MAIL_ADMIN_TOKEN: ${MAIL_ADMIN_TOKEN}
      MAIL_HTTP_TIMEOUT_SECONDS: ${MAIL_HTTP_TIMEOUT_SECONDS:-10}
      CALENDARIFIC_API_KEY: ${CALENDARIFIC_API_KEY:-}
      HOLIDAY_HTTP_TIMEOUT_SECONDS: ${HOLIDAY_HTTP_TIMEOUT_SECONDS:-15}
    expose:
      - "9000"
    restart: unless-stopped

  # Background-job worker. Same image and database as the api; the api's
  # `alembic upgrade head` installs the Procrastinate schema, so the worker only
  # runs. Scale with `--concurrency`, or run more replicas.
  worker:
    build:
      context: ./core
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL}
      DATABASE_ECHO: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    command: ["procrastinate", "--app=ember.jobs.app.app", "worker"]
    depends_on:
      - api
    restart: unless-stopped

  web:
    build:
      context: ./web
    environment:
      BACKEND_URL: http://api:9000
    ports:
      - "6000:6000"
    depends_on:
      - api
    restart: unless-stopped

  # Mail server (docs/rfc/mail-module.md §2, §4). Opt-in: this service only
  # starts when the `mail` profile is active (`docker compose --profile mail
  # up -d`, or COMPOSE_PROFILES=mail) — a deploy that never touches mail never
  # runs this container. `api`/`worker` still talk to it over MAIL_SERVER_URL
  # regardless of how it's actually reached; the internal DNS name `stalwart`
  # is just the default for this same-compose-network case.
  #
  # First boot: `docker compose --profile mail logs stalwart | grep -A8
  # 'bootstrap mode'` for the temporary admin password, then open
  # http://<host>:8080/admin to finish setup and mint an API key for
  # MAIL_ADMIN_TOKEN. Domains created in Ember's Mail > Domains UI are *not*
  # mirrored here automatically yet — each one also needs a matching Domain
  # object created in Stalwart before accounts on it can be provisioned.
  stalwart:
    image: stalwartlabs/stalwart:v0.16
    ports:
      - "18080:8080"
      - "25:25"
      - "587:587"
      - "465:465"
      - "143:143"
      - "993:993"
    expose:
      - "8080"
    volumes:
      - stalwart-etc:/etc/stalwart
      - stalwart-data:/var/lib/stalwart
    restart: unless-stopped

volumes:
  stalwart-etc:
  stalwart-data:
